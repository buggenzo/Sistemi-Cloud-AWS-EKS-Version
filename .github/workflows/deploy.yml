name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'k8s/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v3

    - name: Login su Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build e Push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: buggenzo/task-frontend:latest

    - name: Build e Push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: buggenzo/task-backend:latest

    - name: Deploy su Kubernetes (Master Node)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.AWS_MASTER_IP }}
        username: ubuntu
        key: ${{ secrets.AWS_SSH_KEY }}
        script: |
          # Riavvio pod per download immagini
          kubectl rollout restart deployment backend-deploy
          kubectl rollout restart deployment frontend-deploy

    - name: Configura le credenziali AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Aggiorna il kubeconfig per EKS
      run: aws eks update-kubeconfig --region us-east-1 --name task-manager-cluster

    - name: Deploy su EKS (Kubernetes)
      run: |
        # Applica l'intera cartella k8s (crea le risorse se non esistono, le aggiorna se esistono)
        kubectl apply -f ./k8s/
        
        # Riavvio pod per forzare pull imm :latest
        kubectl rollout restart deployment backend-deploy
        kubectl rollout restart deployment frontend-deploy